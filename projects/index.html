<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>projects - karmirarev</title>
  <style>
    body {
      background-color: rgb(212, 211, 200);
      background-image: url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2220%22 height=%2220%22><rect x=%229%22 y=%229%22 width=%222%22 height=%222%22 fill=%22%235CD0E6%22/></svg>');
      margin: 0;
      padding: 20px;
      font-family: 'Courier New', monospace;
    }
    a {
      text-decoration: none;
      color: #0000EE;
    }
    .page-layout {
      display: flex;
      align-items: flex-start;
      gap: 40px;
    }
    .content {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      padding: 20px;
    }
    .menu {
      flex-shrink: 0;
      width: 280px;
      position: sticky;
      top: 20px;
    }
    .art-image {
      max-width: 700px;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

<div class="page-layout">
  <div class="content" id="content">
    <p>some silly things i work/worked on</p>
  </div>

  <div class="menu">
    <p><a href="../">🟒</a></p>
    <p>projects</p>
    <br>
    <p><a href="#" onclick="show('games'); return false;">games</a></p>
    <p><a href="#" onclick="show('other'); return false;">other</a></p>
  </div>
</div>

<script>
  const sections = {
    games: `
      <p>some silly games i work/worked on</p>
      <p><a href="./games/bebe-heist">bebe heist</a></p>
      <p><a href="./games/pingala">pingala</a></p>
    `,
    other: `
      <p>some other silly things i work/worked on</p>
      <p><a href="./other/mini-me-and-you">mini-me-and-u</a></p>
    `,
  };

  function show(section) {
    document.getElementById('content').innerHTML = sections[section];
  }
</script>

</body>
</html>
